version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.10
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
    - MINIO_ACCESS_KEY=minioadmin
    - MINIO_SECRET_KEY=minioadmin
    - MINIO_ENDPOINT=http://minio:9000
    - POSTGRES_USER=dwh_user
    - POSTGRES_PASSWORD=dwh_pass
    - POSTGRES_DB=dwh_db
    - POSTGRES_HOST=postgres
    - _PIP_ADDITIONAL_REQUIREMENTS=minio pandas langdetect psycopg2-binary sqlalchemy beautifulsoup4 kafka-python pyarrow feedparser
    - DB_CONN=postgresql+psycopg2://dwh_user:dwh_pass@postgres:5432/dwh_db
    - KAFKA_BROKER=kafka:9092
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./scrapers:/opt/airflow/scrapers
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ---------------------------------
  # Postgres (Data Warehouse & Airflow DB)
  # ---------------------------------
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  # ---------------------------------
  # MinIO (Data Lake)
  # ---------------------------------
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/bronze;
      /usr/bin/mc mb myminio/silver;
      /usr/bin/mc mb myminio/gold;
      /usr/bin/mc policy set public myminio/bronze;
      /usr/bin/mc policy set public myminio/silver;
      /usr/bin/mc policy set public myminio/gold;
      exit 0;
      "

  # ---------------------------------
  # Apache Kafka (Broker temps réel)
  # ---------------------------------
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - CLUSTER_ID=ci7u8iHNTb-9l2Iq_oA-1A
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_MIN_INSYNC_REPLICAS=1
    volumes:
      - kafka_data:/bitnami/kafka

  # ---------------------------------
  # Apache Airflow 
  # ---------------------------------
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'False'
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_ENDPOINT: http://minio:9000
      POSTGRES_USER: dwh_user
      POSTGRES_PASSWORD: dwh_pass
      POSTGRES_DB: dwh_db
      POSTGRES_HOST: postgres
      _PIP_ADDITIONAL_REQUIREMENTS: minio pandas langdetect psycopg2-binary sqlalchemy beautifulsoup4 kafka-python pyarrow feedparser
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8085:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

  # ---------------------------------
  # Metabase (Visualisation)
  # ---------------------------------
  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: dwh_db
      MB_DB_PORT: 5432
      MB_DB_USER: dwh_user
      MB_DB_PASS: dwh_pass
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------
  # Applications Custom (Python)
  # ---------------------------------
  streaming-scraper:
    build: ./scrapers
    command: python streaming_scraper.py
    environment:
      - KAFKA_BROKER=kafka:9092
      - PYTHONUNBUFFERED=1
    depends_on:
      - kafka

  kafka-consumer:
    build: ./kafka_consumer
    command: python consumer.py
    environment:
      - KAFKA_BROKER=kafka:9092
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_ENDPOINT=minio:9000
      - PYTHONUNBUFFERED=1
    depends_on:
      - kafka
      - minio

  # ---------------------------------
  # Monitoring (Prometheus & Grafana)
  # ---------------------------------
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data:
  kafka_data:
  prometheus_data:
  grafana_data:
