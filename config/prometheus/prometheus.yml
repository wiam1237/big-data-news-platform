global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']

  # Pour Kafka (Nécessite JMX exporter, ou utiliser bitnami metrics)
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9308']
