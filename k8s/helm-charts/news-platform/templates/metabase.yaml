apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "news-platform.fullname" . }}-metabase
spec:
  replicas: {{ .Values.metabase.replicas }}
  selector:
    matchLabels:
      app: metabase
  template:
    metadata:
      labels:
        app: metabase
    spec:
      containers:
      - name: metabase
        image: metabase/metabase:latest
        env:
        - name: MB_DB_TYPE
          value: "postgres"
        - name: MB_DB_DBNAME
          value: {{ .Values.postgres.database }}
        - name: MB_DB_PORT
          value: "5432"
        - name: MB_DB_USER
          value: {{ .Values.postgres.username }}
        - name: MB_DB_PASS
          value: {{ .Values.postgres.password }}
        - name: MB_DB_HOST
          value: "postgres"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: metabase
spec:
  selector:
    app: metabase
  ports:
  - port: 3000
    targetPort: 3000
